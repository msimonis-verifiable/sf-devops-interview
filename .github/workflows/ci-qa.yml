name: CI - QA

on:
    workflow_dispatch:
    push:
        branches:
            - qa
        paths-ignore:
            - 'sfdx-project.json'
            - 'README.md'

jobs:
    qa-build:
        runs-on: ubuntu-latest
        steps:
            - name: 'Install Salesforce CLI'
              run: |
                  wget https://developer.salesforce.com/media/salesforce-cli/sfdx/channels/stable/sfdx-linux-x64.tar.xz
                  mkdir ~/sfdx
                  tar xJf sfdx-linux-x64.tar.xz -C ~/sfdx --strip-components 1
                  echo "$HOME/sfdx/bin" >> $GITHUB_PATH
                  ~/sfdx/bin/sfdx version

            - name: 'Checkout source code'
              uses: actions/checkout@v3

            - name: 'Setup Package Manager'
              uses: actions/setup-node@v3
              with:
                  node-version: 16
                  cache: 'npm'

            - name: 'Install Build Dependencies'
              run: npm install

            - name: 'Remove namespace'
              run: 'sed -i "s/credcheck__//g" force-app/main/customMetadata/*.md-meta.xml'

            - name: 'Set Connected App Secrets'
              shell: bash
              run: |
                  FILE_PATH=./force-app/main/customMetadata/Setup_Configuration.Default.md-meta.xml
                  sed -i "s/CREDCHECK_CLIENT_ID/${{ secrets.CREDCHECK_CLIENT_ID }}/g" $FILE_PATH
                  sed -i "s/CREDCHECK_CLIENT_SECRET/${{ secrets.CREDCHECK_CLIENT_SECRET }}/g" $FILE_PATH
                  echo "Secrets have been set in metadata file"

            - name: 'Update required fields for QA org'
              shell: bash
              run: |
                  FILES=(
                      "./force-app/main/objects/License__c/fields/State__c.field-meta.xml"
                      "./force-app/main/objects/License__c/fields/Provider__c.field-meta.xml"
                  )
                  for FILE in "${FILES[@]}"; do
                      if [ -f "$FILE" ]; then
                          sed -i "s|<required>true</required>|<required>false</required>|g" "$FILE"
                      fi
                  done

            - name: 'Comment @deprecated annotation'
              run: 'sed -i "s|@deprecated|//@deprecated|g" force-app/main/classes/**/*.cls'

            - name: 'Enable DMF'
              run: npm run utils:cm:enable:dmfcredentialing

            - name: 'Convert to mdapi'
              run: 'sf project convert source --root-dir force-app --source-dir force-app/fflib --source-dir force-app/main --output-dir mdapi_output_dir --package-name "CredCheck"'

            - name: 'Decrypt key'
              run: 'openssl enc -nosalt -aes-256-cbc -d -in assets/server-key/server.key.enc -out assets/server-key/server.key -base64 -K ${{ secrets.DECRYPTION_KEY }} -iv ${{ secrets.DECRYPTION_IV }}'

            - name: 'Authorize QA org'
              run: 'sf org login jwt --instance-url ${{ secrets.ENDPOINT }} --client-id ${{ secrets.QA_CONSUMER_KEY }} --jwt-key-file assets/server-key/server.key --username ${{ secrets.QA_USER_NAME }} --alias QA'

            - name: 'Deploy mdapi'
              run: 'sf project deploy start --manifest mdapi_output_dir/package.xml --target-org QA --wait 60 --test-level NoTestRun'

            - name: 'Deploy destructive changes'
              run: 'sf project deploy start --manifest assets/destructiveChanges/package.xml --post-destructive-changes assets/destructiveChanges/destructiveChanges.xml --target-org QA --ignore-warnings'
