name: Validate deploy-production workflow

on:
    pull_request:
        branches:
            - main
        paths:
            - '.github/workflows/deploy-production.yml'

jobs:
    validate:
        name: 'Check deploy-production.yml for issues'
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout source code'
              uses: actions/checkout@v4

            - name: 'Validate workflow'
              run: bash .github/scripts/validate-deploy-workflow.sh
