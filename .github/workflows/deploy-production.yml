# CI/CD Pipeline - Deploy Managed Package to Target Org
# This workflow deploys the CredCheck managed package when code is pushed to main.
#
# !! THIS WORKFLOW HAS ISSUES !!
# Your task: find and fix them, then open a pull request.
# The validate-deploy-workflow CI check must pass.

name: CI - Deploy to Production Org

on:
    push:
        branches:
            - main
        paths-ignore:
            - 'README.md'

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # Install Salesforce CLI
            - name: 'Install Salesforce CLI'
              run: |
                  wget https://developer.salesforce.com/media/salesforce-cli/sfdx/channels/stable/sfdx-linux-x64.tar.xz
                  mkdir ~/sfdx
                  tar xJf sfdx-linux-x64.tar.xz -C ~/sfdx --strip-components 1
                  echo "$HOME/sfdx/bin" >> $GITHUB_PATH
                  ~/sfdx/bin/sfdx version

            # Checkout the source code
            - name: 'Checkout source code'
              uses: actions/checkout@v2

            # Setup Node.js
            - name: 'Setup Node.js'
              uses: actions/setup-node@v3
              with:
                  node-version: 16
                  cache: 'npm'

            # Install dependencies
            - name: 'Install Build Dependencies'
              run: npm install

            # Remove namespace from custom metadata
            - name: 'Remove namespace from metadata'
              run: 'sed -i "s/credcheck__//g" force-app/main/customMetadata/*.md-meta.xml'

            # Set Connected App secrets in metadata file
            - name: 'Set Connected App Secrets'
              run: |
                  FILE_PATH=./force-app/main/customMetadata/Setup_Configuration.Default.md-meta.xml
                  sed -i "s/CREDCHECK_CLIENT_ID/${{ secrets.CREDCHECK_CLIENT_ID }}/g" $FILE_PATH
                  sed -i "s/CREDCHECK_CLIENT_SECRET/${{ secrets.CREDCHECK_CLIENT_SECRET }}/g" $FILE_PATH
                  echo "Updated metadata file contents:"
                  cat $FILE_PATH

            # Comment out @deprecated annotations
            - name: 'Comment @deprecated annotation'
              run: 'sed -i "s|@deprecated|//@deprecated|g" force-app/main/classes/**/*.cls'

            # Convert source to metadata API format
            - name: 'Convert to MDAPI format'
              run: 'sf project convert source --root-dir force-app --source-dir force-app/fflib --source-dir force-app/main --output-dir mdapi_output_dir --package-name "CredCheck"'

            # Decrypt the server key for JWT authentication
            - name: 'Decrypt server key'
              run: 'openssl enc -nosalt -aes-256-cbc -d -in assets/server-key/server.key.enc -out assets/server-key/server.key -base64 -K ${{ secrets.DECRYPTION_KEY }} -iv ${{ secrets.DECRYPTION_IV }}'

            # Authenticate with the target org
            - name: 'Authorize target org'
              run: 'sf org login jwt --instance-url ${{ secrets.ENDPOINT }} --client-id ${{ secrets.CONSUMER_KEY }} --jwt-key-file assets/server-key/server.key --username ${{ secrets.USERNAME }} --alias production'

            # Deploy to the org
            - name: 'Deploy to production'
              run: 'sf project deploy start --manifest mdapi_output_dir/package.xml --target-org production --test-level NoTestRun'

            # Deploy destructive changes
            - name: 'Deploy destructive changes'
              run: 'sf project deploy start --manifest assets/destructiveChanges/package.xml --post-destructive-changes assets/destructiveChanges/destructiveChanges.xml --target-org production --ignore-warnings'

            # Notify team on Slack
            - name: 'Notify Slack'
              uses: slackapi/slack-github-action@v2.1.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_BOT_TOKEN }}
                  payload: |
                      channel: ${{ secrets.SLACK_CHANNEL_ID }}
                      text: ":white_check_mark: *Production deployment complete* \n Branch: ${{ github.ref_name }} \n Commit: ${{ github.sha }} \n Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
