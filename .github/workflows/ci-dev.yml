name: CI - Develop

on:
    workflow_dispatch:
    pull_request:
        branches:
            - develop
            - 'patch_**'
            - 'feature_**'
        paths-ignore:
            - 'sfdx-project.json'
            - 'README.md'

    push:
        branches:
            - develop
            - 'feature_**'
        paths-ignore:
            - 'sfdx-project.json'
            - 'README.md'

jobs:
    scratch-org-test:
        runs-on: ubuntu-latest
        container:
            image: salesforce/cli:latest-full
        steps:
            - name: 'Checkout source code'
              uses: actions/checkout@v4

            - name: 'Install build-essential packages'
              run: apt-get update && apt-get install -y build-essential

            - name: 'Install Build Dependencies'
              run: npm install

            - name: 'Populate auth file with DEVHUB_SFDX_URL secret'
              shell: bash
              run: |
                  echo ${{ secrets.DEVHUB_SFDX_URL}} > ./DEVHUB_SFDX_URL.txt
                  secretFileSize=$(wc -c "./DEVHUB_SFDX_URL.txt" | awk '{print $1}')
                  if [ $secretFileSize == 1 ]; then
                      echo "Missing DEVHUB_SFDX_URL secret. Is this workflow running on a fork?";
                      exit 1;
                  fi

            - name: 'Set Connected App Secrets'
              shell: bash
              run: |
                  FILE_PATH=./force-app/main/customMetadata/Setup_Configuration.Default.md-meta.xml
                  sed -i "s/CREDCHECK_CLIENT_ID/${{ secrets.CREDCHECK_CLIENT_ID }}/g" $FILE_PATH
                  sed -i "s/CREDCHECK_CLIENT_SECRET/${{ secrets.CREDCHECK_CLIENT_SECRET }}/g" $FILE_PATH
                  echo "Secrets have been set in metadata file"

            - name: 'Authenticate Dev Hub'
              run: sf org login sfdx-url --sfdx-url-file ./DEVHUB_SFDX_URL.txt --set-default-dev-hub --alias devhub

            - name: 'Create scratch org'
              run: sf org create scratch --alias scratch-org --definition-file config/project-scratch-def.json --no-track-source --duration-days 1 --set-default

            - name: 'Push source to scratch org'
              run: sf project deploy start --wait 60 --source-dir force-app

            - name: 'Assign permissionset to default user'
              run: npm run org:assign:permsets scratch-org

            - name: 'Run Apex tests'
              run: sf apex run test --code-coverage --result-format human --output-dir ./tests/apex --wait 60 --target-org scratch-org --concise

            - name: 'Check Org Wide Coverage'
              run: bash ./assets/code-coverage/coverageCheck.sh

            - name: 'Check Changed Files for Code Coverage'
              run: bash ./assets/code-coverage/classCoverageCheck.sh

            - name: 'Run Jest tests'
              run: npm run test:unit:ci

            - name: 'Delete scratch org'
              if: always()
              run: sf org delete scratch -p --target-org scratch-org

    report-failure-to-slack:
        name: 'Report Failure to Slack (develop pushes)'
        runs-on: ubuntu-latest
        needs: [scratch-org-test]
        if: ${{ always() && needs.scratch-org-test.result == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
        steps:
            - name: 'Post failure message to Slack'
              uses: slackapi/slack-github-action@v2.1.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_CI_BOT_TOKEN }}
                  payload: |
                      channel: ${{ secrets.SLACK_ALERTS_CHANNEL_ID }}
                      text: ":warning: *CI Failure on develop branch* :warning: \n ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
